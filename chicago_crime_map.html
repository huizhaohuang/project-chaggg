<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chicago Crime Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    #map { height: 100%; width: 100%; }
  </style>
</head>
<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script>
    const map = L.map('map').setView([41.8781, -87.6298], 11);

    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors',
      maxZoom: 19
    }).addTo(map);

    fetch('data/sampled_points.json')
      .then(r => r.json())
      .then(points => {
        const clusters = L.markerClusterGroup();
        points.forEach(([lat, lon, type]) => {
          const marker = L.circleMarker([lat, lon], {
            radius: 3,
            color: '#e74c3c',
            fillOpacity: 0.6,
            weight: 0
          });
          marker.bindPopup(type);
          clusters.addLayer(marker);
        });
        map.addLayer(clusters);

        // Load heatmap plugin dynamically then create layer
        const script = document.createElement('script');
        script.src = 'https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js';
        script.onload = () => {
          const heatData = points.map(([lat, lon]) => [lat, lon, 0.4]);
          L.heatLayer(heatData, {
            radius: 12,
            blur: 18,
            maxZoom: 15,
            minOpacity: 0.05,
            max: 1.0,
            gradient: {
              0.0: 'rgba(0,0,0,0)',
              0.15: '#1a9850',
              0.3: '#91cf60',
              0.45: '#d9ef8b',
              0.6: '#fee08b',
              0.75: '#fc8d59',
              0.9: '#d73027',
              1.0: '#a50026'
            }
          }).addTo(map);
        };        
        script.onerror = () => console.error('Failed to load leaflet-heat plugin');
        document.head.appendChild(script);
      });

      // Load community area boundaries and stats
        Promise.all([
          fetch('data/chicago_community_areas.geojson').then(r => r.json()),
          fetch('data/community_stats.json').then(r => r.json())
        ]).then(([geojson, stats]) => {
          L.geoJSON(geojson, {
            style: {
              color: '#434343',
              weight: 1.2,
              fillOpacity: 0,
              opacity: 0.6
            },            onEachFeature: (feature, layer) => {
              const areaNum = feature.properties.area_numbe;
              const name = feature.properties.community;
              const s = stats[areaNum];
              if (s) {
                const top3 = s.top3.map(([t, c]) => `<li>${t}: ${c.toLocaleString()}</li>`).join('');
                layer.bindPopup(`
                  <div style="font-family:sans-serif;min-width:180px">
                    <strong style="font-size:14px">${name}</strong><br>
                    <span>Total Crimes: ${s.total.toLocaleString()}</span>
                    <hr style="margin:4px 0">
                    <strong>Top 3 Types:</strong>
                    <ol style="margin:4px 0 0 16px;padding:0">${top3}</ol>
                  </div>
                `);
              }
            }
          }).addTo(map);
        });

  </script>
</body>
</html>
